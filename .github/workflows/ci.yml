name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go-tests:
    name: Go tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - hermes
          - forge
          - test/e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            hermes/go.sum
            forge/go.sum
            test/e2e/go.sum

      - name: Test ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go test ./...
