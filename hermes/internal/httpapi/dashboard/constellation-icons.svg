<!-- constellation-icons.svg — CON-002 SVG symbol library
     Canonical source for all constellation node icons.
     Referenced via <use href="constellation-icons.svg#icon-X"> from index.html.
     Icon language from constellation-spec.md:
       KITT:    diamond beacon
       Hermes:  envelope glyph
       Forge:   forge / lightning tool mark
       Claude:  starburst glyph
       OpenCode: angle-bracket glyph
       life-os: leaf / organic shape (KITT sub-agent)
       rookery: layered rectangles (KITT sub-agent, multi-session host)
       unknown: solid dot (fallback for unrecognized executor)
-->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- KITT: diamond beacon -->
    <symbol id="icon-kitt" viewBox="0 0 24 24">
      <path d="M12 2 L16 10 L12 22 L8 10 Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
    </symbol>

    <!-- Hermes: envelope glyph -->
    <symbol id="icon-hermes" viewBox="0 0 24 24">
      <path d="M4 6 L12 13 L20 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 6 L4 18 L20 18 L20 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- Forge: forge / lightning tool mark -->
    <symbol id="icon-forge" viewBox="0 0 24 24">
      <path d="M8 4 L16 4 L13 12 L18 12 L6 22 L10 14 L5 14 Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
      <path d="M7 7 L11 11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>

    <!-- Claude: starburst glyph -->
    <symbol id="icon-claude" viewBox="0 0 24 24">
      <path d="M12 2 L13.5 8.5 L20 10 L13.5 11.5 L12 18 L10.5 11.5 L4 10 L10.5 8.5 Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    </symbol>

    <!-- OpenCode: angle-bracket glyph -->
    <symbol id="icon-opencode" viewBox="0 0 24 24">
      <path d="M6 6 L2 12 L6 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 6 L22 12 L18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- life-os: leaf / organic shape (KITT sub-agent) -->
    <symbol id="icon-life-os" viewBox="0 0 24 24">
      <path d="M12 21 C12 21 4 16 4 9 C4 5.5 7 3 10 3 C11.5 3 12 4 12 4 C12 4 12.5 3 14 3 C17 3 20 5.5 20 9 C20 16 12 21 12 21Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M12 4 L12 14" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    </symbol>

    <!-- rookery: layered rectangles (KITT sub-agent hosting multiple sessions) -->
    <symbol id="icon-rookery" viewBox="0 0 24 24">
      <rect x="4" y="6" width="16" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <rect x="4" y="12" width="16" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="1.6"/>
      <rect x="4" y="18" width="16" height="4" rx="1" fill="none" stroke="currentColor" stroke-width="1.6"/>
    </symbol>

    <!-- unknown: solid dot (fallback for unrecognized executor) -->
    <symbol id="icon-unknown" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5" fill="currentColor"/>
    </symbol>

    <!-- Legacy alias: generic = unknown -->
    <symbol id="icon-generic" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5" fill="currentColor"/>
    </symbol>
  </defs>
</svg>
